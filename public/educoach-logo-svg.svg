<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 20010904//EN"
 "http://www.w3.org/TR/2001/REC-SVG-20010904/DTD/svg10.dtd">
<svg version="1.0" xmlns="http://www.w3.org/2000/svg"
 width="635.000000pt" height="635.000000pt" viewBox="0 0 635.000000 635.000000"
 preserveAspectRatio="xMidYMid meet">
<style>
  .edu-stroke {
    stroke: url(#eduStrokeGradient);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-linejoin: round;
    vector-effect: non-scaling-stroke;
    fill: url(#eduFillGradient);
    fill-opacity: 0.08;
    stroke-dasharray: 1250;
    stroke-dashoffset: 1250;
    opacity: 0.96;
    animation: eduStrokeDraw 3.8s cubic-bezier(0.23, 1, 0.32, 1) infinite,
      eduStrokeSettle 3.8s ease-in-out infinite;
  }

  @keyframes eduStrokeDraw {
    0% {
      stroke-dashoffset: 1250;
      fill-opacity: 0.02;
      opacity: 0.48;
    }
    58% {
      stroke-dashoffset: 0;
      fill-opacity: 0.09;
      opacity: 1;
    }
    100% {
      stroke-dashoffset: 0;
      fill-opacity: 0.08;
      opacity: 0.9;
    }
  }

  @keyframes eduStrokeSettle {
    0%, 65%, 100% {
      opacity: 0.96;
    }
    82% {
      opacity: 0.82;
    }
  }

  .edu-stroke-1 { animation-delay: 0s, 0s; }
  .edu-stroke-2 {
    animation-delay: 0.18s, 0.18s;
    stroke-width: 4.75;
    fill-opacity: 0.03;
    stroke-linecap: butt;
    stroke-linejoin: miter;
    stroke-miterlimit: 10;
  }
  .edu-stroke-3 { animation-delay: 0.36s, 0.36s; }

  @media (prefers-reduced-motion: reduce) {
    .edu-stroke {
      animation: none;
      stroke-dashoffset: 0;
      opacity: 1;
    }
  }
</style>

<defs>
  <linearGradient id="eduStrokeGradient" x1="8%" y1="10%" x2="92%" y2="90%">
    <stop offset="0%" stop-color="#C4B5FD" />
    <stop offset="45%" stop-color="#8B5CF6" />
    <stop offset="100%" stop-color="#6D28D9" />
  </linearGradient>
  <linearGradient id="eduFillGradient" x1="0%" y1="15%" x2="100%" y2="85%">
    <stop offset="0%" stop-color="#C4B5FD" />
    <stop offset="100%" stop-color="#8B5CF6" />
  </linearGradient>
</defs>

